<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noize Nación Radio</title>

<style>

body{
background:#0a0a0a;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
color:white;
}

.player{
background:#111;
border-radius:20px;
padding:30px;
width:320px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,200,0.2);
}

.logo{
font-size:22px;
letter-spacing:2px;
font-weight:bold;
margin-bottom:10px;
}

.live{
color:#00ffc8;
font-size:12px;
margin-bottom:20px;
}

button{
background:#00ffc8;
border:none;
border-radius:50%;
width:70px;
height:70px;
font-size:22px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.controls{
margin-top:15px;
}

input[type=range]{
width:100%;
}

.equalizer{
display:flex;
justify-content:center;
margin-top:20px;
gap:4px;
}

.bar{
width:5px;
height:10px;
background:#00ffc8;
animation:wave 1s infinite;
}

.bar:nth-child(2){animation-delay:0.2s;}
.bar:nth-child(3){animation-delay:0.4s;}
.bar:nth-child(4){animation-delay:0.6s;}
.bar:nth-child(5){animation-delay:0.8s;}

@keyframes wave{
0%{height:10px}
50%{height:25px}
100%{height:10px}
}

</style>
</head>

<body>

<div class="player">

<div class="logo">NOIZE NACIÓN</div>
<div class="live">● LIVE STREAM</div>

<button id="playBtn">▶</button>

<div class="controls">
<input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
</div>

<div class="equalizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

</div>

<audio id="radio" preload="none">
<source src="https://a11.asurahosting.com:8940/radio.mp3" type="audio/mpeg">
</audio>

<script>

const radio = document.getElementById("radio")
const playBtn = document.getElementById("playBtn")
const volume = document.getElementById("volume")

let playing = false

playBtn.addEventListener("click", function(){

if(!playing){
radio.play()
playBtn.innerHTML="❚❚"
playing=true
}else{
radio.pause()
playBtn.innerHTML="▶"
playing=false
}

})

volume.addEventListener("input", function(){
radio.volume = volume.value
})

</script>

</body>
</html>
